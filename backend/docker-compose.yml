services:
  postgres:
    image: postgres:16
    container_name: cafe-postgres
    environment:
      POSTGRES_DB: cafe_employee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cafe_postgres_data:/var/lib/postgresql/data

volumes:
  cafe_postgres_data: